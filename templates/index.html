<!DOCTYPE html>
<html dir="rtl" lang="he">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Daf Yomi Downloader</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            direction: rtl;
            text-align: right;
            margin: 0;
            padding: 20px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
        }
        
        .container {
            max-width: 600px;
            margin: 0 auto;
            background: white;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }
        
        h1 {
            color: #333;
            text-align: center;
            margin-bottom: 30px;
            font-size: 2.5em;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.1);
        }
        
        .form-group {
            margin-bottom: 20px;
        }
        
        label {
            display: block;
            margin-bottom: 8px;
            font-weight: bold;
            color: #555;
            font-size: 1.1em;
        }
        
        select, input {
            width: 100%;
            padding: 12px;
            border: 2px solid #ddd;
            border-radius: 8px;
            font-size: 16px;
            transition: border-color 0.3s;
        }
        
        select:focus, input:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }
        
        .page-range {
            display: grid;
            grid-template-columns: 1fr auto 1fr;
            gap: 10px;
            align-items: end;
        }
        
        .range-separator {
            text-align: center;
            font-weight: bold;
            font-size: 1.2em;
            color: #666;
            padding: 12px 0;
        }
        
        .download-btn {
            width: 100%;
            padding: 15px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
            margin-top: 20px;
        }
        
        .download-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }
        
        .download-btn:disabled {
            background: #ccc;
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }
        
        .status {
            margin-top: 20px;
            padding: 10px;
            border-radius: 8px;
            text-align: center;
            display: none;
        }
        
        .status.success {
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }
        
        .status.error {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }
        
        .status.loading {
            background: #d1ecf1;
            color: #0c5460;
            border: 1px solid #bee5eb;
        }
        
        .spinner {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 3px solid #f3f3f3;
            border-top: 3px solid #0c5460;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-left: 10px;
        }
        
        .progress-container {
            background: #f0f0f0;
            border-radius: 10px;
            padding: 0;
            margin: 10px 0;
            display: none;
        }
        
        .progress-bar {
            background: linear-gradient(90deg, #667eea 0%, #764ba2 100%);
            height: 20px;
            border-radius: 10px;
            width: 0%;
            transition: width 0.3s ease;
            position: relative;
        }
        
        .progress-text {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: white;
            font-size: 12px;
            font-weight: bold;
        }
        
        .current-page {
            text-align: center;
            margin: 10px 0;
            font-weight: bold;
            color: #555;
            display: none;
        }
        
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        
        .info-box {
            background: #e7f3ff;
            border: 1px solid #b3d9ff;
            border-radius: 8px;
            padding: 15px;
            margin-bottom: 20px;
            color: #004085;
        }
        
        .info-box h3 {
            margin-top: 0;
            color: #0056b3;
        }
        
        .hebrew-input {
            text-align: center;
            font-family: 'Times New Roman', serif;
            font-size: 18px;
        }
        
        .tractate-search {
            position: relative;
        }
        
        .tractate-dropdown {
            position: absolute;
            top: 100%;
            left: 0;
            right: 0;
            background: white;
            border: 2px solid #ddd;
            border-top: none;
            border-radius: 0 0 8px 8px;
            max-height: 200px;
            overflow-y: auto;
            z-index: 1000;
            display: none;
        }
        
        .tractate-option {
            padding: 12px;
            cursor: pointer;
            border-bottom: 1px solid #eee;
            font-family: 'Times New Roman', serif;
            font-size: 16px;
            transition: background-color 0.2s;
        }
        
        .tractate-option:hover {
            background-color: #f0f8ff;
        }
        
        .tractate-option.selected {
            background-color: #667eea;
            color: white;
        }
        
        .tractate-option:last-child {
            border-bottom: none;
        }
        
        .tractate-option.hidden {
            display: none;
        }
        
        .input-with-arrows {
            position: relative;
            display: flex;
            flex-direction: column;
        }
        
        .arrow-buttons {
            position: absolute;
            right: 1px;
            top: 1px;
            bottom: 1px;
            display: flex;
            flex-direction: column;
            width: 18px;
        }
        
        .arrow-btn {
            background: #f8f8f8;
            border: 1px solid #ccc;
            border-left: 1px solid #ddd;
            width: 100%;
            height: 50%;
            cursor: pointer;
            font-size: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background-color 0.2s;
            user-select: none;
        }
        
        .arrow-btn:hover {
            background: #e8e8e8;
        }
        
        .arrow-btn:active {
            background: #d8d8d8;
        }
        
        .arrow-btn.up {
            border-bottom: none;
            border-radius: 0 7px 0 0;
        }
        
        .arrow-btn.down {
            border-top: none;
            border-radius: 0 0 7px 0;
        }
        
        .page-input-container {
            flex: 1;
        }
        
        .page-input {
            display: flex;
            gap: 10px;
        }
        
        .input-with-arrows input,
        .input-with-arrows select {
            padding-right: 22px;
        }
        
        .input-with-arrows select {
            appearance: none;
            background-image: none;
        }

        .toast-container {
            position: fixed;
            bottom: 24px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 9999;
            display: flex;
            flex-direction: column;
            gap: 8px;
            align-items: center;
            pointer-events: none;
        }

        .toast {
            background: #323232;
            color: #fff;
            padding: 10px 20px;
            border-radius: 6px;
            font-size: 14px;
            box-shadow: 0 3px 10px rgba(0,0,0,0.3);
            opacity: 0;
            transform: translateY(10px);
            transition: opacity 0.25s ease, transform 0.25s ease;
            max-width: 420px;
            text-align: center;
            pointer-events: auto;
            direction: rtl;
        }

        .toast.toast-error {
            background: #c0392b;
        }

        .toast.toast-warning {
            background: #e67e22;
        }

        .toast.visible {
            opacity: 1;
            transform: translateY(0);
        }

        .field-invalid input,
        .field-invalid select {
            border-color: #e74c3c !important;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>📖 Daf Yomi Downloader</h1>
        
        <div class="info-box">
            <h3>איך להשתמש:</h3>
            <p>בחרו מסכת, טווח דפים, ולחצו על הורדה. הקבצים יורדו כ-HTML מאוחד.</p>
        </div>
        
        <form id="downloadForm">
            <div class="form-group">
                <label for="tractate">מסכת:</label>
                <div class="tractate-search">
                    <input type="text" id="tractate" name="tractate" placeholder="הקלד שם מסכת..." class="hebrew-input" autocomplete="off" required>
                    <div id="tractateDropdown" class="tractate-dropdown">
                        {% for tractate_name, tractate_id in tractates.items() %}
                        <div class="tractate-option" data-value="{{ tractate_name }}">{{ tractate_name }}</div>
                        {% endfor %}
                    </div>
                </div>
            </div>
            
            <div class="form-group">
                <label>טווח דפים:</label>
                <div class="page-range">
                    <div class="page-input-container">
                        <div class="page-input">
                            <div class="input-with-arrows">
                                <input type="text" id="startDaf" value="ב" class="hebrew-input" required pattern="[א-ת]+" title="הכנס מספר דף בעברית">
                                <div class="arrow-buttons">
                                    <button type="button" class="arrow-btn up" data-target="startDaf" tabindex="-1">▲</button>
                                    <button type="button" class="arrow-btn down" data-target="startDaf" tabindex="-1">▼</button>
                                </div>
                            </div>
                            <div class="input-with-arrows">
                                <select id="startAmud" required>
                                    <option value="א" selected>א</option>
                                    <option value="ב">ב</option>
                                </select>
                                <div class="arrow-buttons">
                                    <button type="button" class="arrow-btn up" data-target="startAmud" tabindex="-1">▲</button>
                                    <button type="button" class="arrow-btn down" data-target="startAmud" tabindex="-1">▼</button>
                                </div>
                            </div>
                        </div>
                    </div>
                    
                    <div class="range-separator">עד</div>
                    
                    <div class="page-input-container">
                        <div class="page-input">
                            <div class="input-with-arrows">
                                <input type="text" id="endDaf" value="ב" class="hebrew-input" required pattern="[א-ת]+" title="הכנס מספר דף בעברית">
                                <div class="arrow-buttons">
                                    <button type="button" class="arrow-btn up" data-target="endDaf" tabindex="-1">▲</button>
                                    <button type="button" class="arrow-btn down" data-target="endDaf" tabindex="-1">▼</button>
                                </div>
                            </div>
                            <div class="input-with-arrows">  
                                <select id="endAmud" required>
                                    <option value="א">א</option>
                                    <option value="ב" selected>ב</option>
                                </select>
                                <div class="arrow-buttons">
                                    <button type="button" class="arrow-btn up" data-target="endAmud" tabindex="-1">▲</button>
                                    <button type="button" class="arrow-btn down" data-target="endAmud" tabindex="-1">▼</button>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
            
            <button type="submit" class="download-btn" id="downloadBtn">
                📥 הורד דפים
            </button>
        </form>
        
        <div id="progressContainer" class="progress-container">
            <div id="progressBar" class="progress-bar">
                <div id="progressText" class="progress-text">0%</div>
            </div>
        </div>
        
        <div id="currentPage" class="current-page"></div>
        
        <div id="status" class="status"></div>
    </div>

    <div class="toast-container" id="toastContainer"></div>

    <script>
        let currentEventSource = null;
        
        document.getElementById('downloadForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            
            const formData = {
                tractate: document.getElementById('tractate').value,
                start_daf: document.getElementById('startDaf').value,
                start_amud: document.getElementById('startAmud').value,
                end_daf: document.getElementById('endDaf').value,
                end_amud: document.getElementById('endAmud').value
            };
            
            // Validate form
            if (!formData.tractate || !formData.start_daf || !formData.start_amud || 
                !formData.end_daf || !formData.end_amud) {
                showStatus('אנא מלא את כל השדות', 'error');
                return;
            }

            if (!runAllValidations()) {
                showStatus('יש שגיאות בטופס - אנא תקן לפני ההורדה', 'error');
                return;
            }
            
            // Show loading status and progress bar
            showStatus('מתחיל הורדה...', 'loading');
            showProgress(true);
            updateProgress(0, 'מתחיל...', '');
            document.getElementById('downloadBtn').disabled = true;
            
            try {
                // Start the download task
                const response = await fetch('/api/download', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify(formData)
                });
                
                if (response.ok) {
                    const data = await response.json();
                    const taskId = data.task_id;
                    
                    // Start listening for progress updates
                    startProgressMonitoring(taskId, formData);
                } else {
                    const error = await response.json();
                    showStatus(`שגיאה: ${error.error}`, 'error');
                    showProgress(false);
                    document.getElementById('downloadBtn').disabled = false;
                }
            } catch (error) {
                showStatus(`שגיאת רשת: ${error.message}`, 'error');
                showProgress(false);
                document.getElementById('downloadBtn').disabled = false;
            }
        });
        
        function startProgressMonitoring(taskId, formData) {
            // Close any existing event source
            if (currentEventSource) {
                currentEventSource.close();
            }
            
            currentEventSource = new EventSource(`/api/progress/${taskId}`);
            
            currentEventSource.onmessage = function(event) {
                const data = JSON.parse(event.data);
                
                updateProgress(data.progress, data.message, data.current_page);
                
                if (data.status === 'completed') {
                    showStatus('הושלם! מוריד קובץ...', 'success');
                    downloadCompletedFile(taskId);
                    currentEventSource.close();
                    currentEventSource = null;
                } else if (data.status === 'error') {
                    showStatus(`שגיאה: ${data.message}`, 'error');
                    showProgress(false);
                    document.getElementById('downloadBtn').disabled = false;
                    currentEventSource.close();
                    currentEventSource = null;
                }
            };
            
            currentEventSource.onerror = function() {
                showStatus('שגיאה בחיבור לשרת', 'error');
                showProgress(false);
                document.getElementById('downloadBtn').disabled = false;
                if (currentEventSource) {
                    currentEventSource.close();
                    currentEventSource = null;
                }
            };
        }
        
        async function downloadCompletedFile(taskId) {
            try {
                const response = await fetch(`/api/download-file/${taskId}`);
                
                if (response.ok) {
                    const filename = response.headers.get('Content-Disposition')?.split('filename=')[1]?.replace(/"/g, '') || 
                                    'download.html';
                    
                    const blob = await response.blob();
                    const url = window.URL.createObjectURL(blob);
                    const a = document.createElement('a');
                    a.href = url;
                    a.download = filename;
                    document.body.appendChild(a);
                    a.click();
                    window.URL.revokeObjectURL(url);
                    document.body.removeChild(a);
                    
                    showStatus('הקובץ הורד בהצלחה! 🎉', 'success');
                } else {
                    showStatus('שגיאה בהורדת הקובץ', 'error');
                }
            } catch (error) {
                showStatus(`שגיאה בהורדת הקובץ: ${error.message}`, 'error');
            } finally {
                showProgress(false);
                document.getElementById('downloadBtn').disabled = false;
            }
        }
        
        function showProgress(show) {
            const container = document.getElementById('progressContainer');
            const currentPage = document.getElementById('currentPage');
            container.style.display = show ? 'block' : 'none';
            currentPage.style.display = show ? 'block' : 'none';
        }
        
        function updateProgress(percentage, message, currentPage) {
            const progressBar = document.getElementById('progressBar');
            const progressText = document.getElementById('progressText');
            const currentPageEl = document.getElementById('currentPage');
            
            progressBar.style.width = percentage + '%';
            progressText.textContent = percentage + '%';
            
            if (currentPage) {
                currentPageEl.textContent = `דף נוכחי: ${currentPage}`;
            }
            
            if (message) {
                showStatus(message, 'loading');
            }
        }
        
        function showStatus(message, type) {
            const statusEl = document.getElementById('status');
            statusEl.className = `status ${type}`;
            statusEl.style.display = 'block';
            
            if (type === 'loading') {
                statusEl.innerHTML = message + '<span class="spinner"></span>';
            } else {
                statusEl.innerHTML = message;
            }
            
            if (type !== 'loading') {
                setTimeout(() => {
                    statusEl.style.display = 'none';
                }, 5000);
            }
        }
        
        // ── Toast notifications ──────────────────────────────────────────────
        let toastQueue = [];

        function showToast(message, type = 'error', duration = 3500) {
            const container = document.getElementById('toastContainer');
            const toast = document.createElement('div');
            toast.className = `toast toast-${type}`;
            toast.textContent = message;
            container.appendChild(toast);

            requestAnimationFrame(() => {
                requestAnimationFrame(() => toast.classList.add('visible'));
            });

            setTimeout(() => {
                toast.classList.remove('visible');
                toast.addEventListener('transitionend', () => toast.remove(), { once: true });
            }, duration);
        }

        // ── Tractate last-daf data ────────────────────────────────────────────
        // Each entry: { lastDaf: <number>, lastAmud: 'א'|'ב' }
        // Numbers are the last daf number (not page count; Talmud starts at daf ב).
        // Last daf and last amud per tractate, verified against Sefaria
        const TRACTATE_LIMITS = {
            'ברכות':     { lastDaf: 64,  lastAmud: 'א' },
            'שבת':       { lastDaf: 157, lastAmud: 'ב' },
            'עירובין':   { lastDaf: 105, lastAmud: 'א' },
            'פסחים':     { lastDaf: 121, lastAmud: 'ב' },
            'שקלים':     { lastDaf: 22,  lastAmud: 'א' },
            'יומא':      { lastDaf: 88,  lastAmud: 'א' },
            'סוכה':      { lastDaf: 56,  lastAmud: 'ב' },
            'ביצה':      { lastDaf: 40,  lastAmud: 'ב' },
            'ראש השנה':  { lastDaf: 35,  lastAmud: 'א' },
            'תענית':     { lastDaf: 31,  lastAmud: 'א' },
            'מגילה':     { lastDaf: 32,  lastAmud: 'א' },
            'מועד קטן':  { lastDaf: 29,  lastAmud: 'א' },
            'חגיגה':     { lastDaf: 27,  lastAmud: 'א' },
            'יבמות':     { lastDaf: 122, lastAmud: 'ב' },
            'כתובות':    { lastDaf: 112, lastAmud: 'ב' },
            'נדרים':     { lastDaf: 91,  lastAmud: 'ב' },
            'נזיר':      { lastDaf: 66,  lastAmud: 'ב' },
            'סוטה':      { lastDaf: 49,  lastAmud: 'ב' },
            'גיטין':     { lastDaf: 90,  lastAmud: 'ב' },
            'קידושין':   { lastDaf: 82,  lastAmud: 'ב' },
            'בבא קמא':   { lastDaf: 119, lastAmud: 'א' },
            'בבא מציעא': { lastDaf: 119, lastAmud: 'א' },
            'בבא בתרא':  { lastDaf: 176, lastAmud: 'א' },
            'סנהדרין':   { lastDaf: 113, lastAmud: 'ב' },
            'מכות':      { lastDaf: 24,  lastAmud: 'ב' },
            'שבועות':    { lastDaf: 49,  lastAmud: 'ב' },
            'עבודה זרה': { lastDaf: 76,  lastAmud: 'א' },
            'הוריות':    { lastDaf: 14,  lastAmud: 'א' },
            'זבחים':     { lastDaf: 120, lastAmud: 'א' },
            'מנחות':     { lastDaf: 110, lastAmud: 'א' },
            'חולין':     { lastDaf: 142, lastAmud: 'א' },
            'בכורות':    { lastDaf: 61,  lastAmud: 'א' },
            'ערכין':     { lastDaf: 34,  lastAmud: 'א' },
            'תמורה':     { lastDaf: 34,  lastAmud: 'א' },
            'כריתות':    { lastDaf: 28,  lastAmud: 'ב' },
            'מעילה':     { lastDaf: 22,  lastAmud: 'א' },
            'תמיד':      { lastDaf: 33,  lastAmud: 'ב' },
            'מדות':      { lastDaf: 37,  lastAmud: 'א' },
            'קינים':     { lastDaf: 25,  lastAmud: 'א' },
            'נדה':       { lastDaf: 73,  lastAmud: 'א' },
        };

        // ── Hebrew number helpers ─────────────────────────────────────────────
        function dafToNumber(hebrewDaf) {
            return hebrewNumbers.indexOf(hebrewDaf) + 1; // index 0 = א = 1, index 1 = ב = 2
        }

        function amudToNumber(amud) {
            return amud === 'א' ? 1 : 2;
        }

        // Compare two daf+amud combos. Returns negative if a < b, 0 if equal, positive if a > b.
        function compareDafAmud(dafA, amudA, dafB, amudB) {
            const na = dafToNumber(dafA) * 2 + amudToNumber(amudA);
            const nb = dafToNumber(dafB) * 2 + amudToNumber(amudB);
            return na - nb;
        }

        function getCurrentTractate() {
            return document.getElementById('tractate').value.trim();
        }

        // ── Field-level visual feedback ───────────────────────────────────────
        function markInvalid(containerId) {
            const el = document.getElementById(containerId);
            if (el) el.closest('.input-with-arrows')?.classList.add('field-invalid');
        }

        function markValid(containerId) {
            const el = document.getElementById(containerId);
            if (el) el.closest('.input-with-arrows')?.classList.remove('field-invalid');
        }

        function clearAllInvalid() {
            ['startDaf','startAmud','endDaf','endAmud'].forEach(markValid);
        }

        // ── Core validation ───────────────────────────────────────────────────
        function validateDafAgainstTractate(dafValue, amudValue, fieldId, label, silent) {
            const tractate = getCurrentTractate();
            const limit = TRACTATE_LIMITS[tractate];
            if (!limit || !dafValue) return true;

            const dafNum = dafToNumber(dafValue);
            const amudNum = amudToNumber(amudValue);

            if (dafNum <= 0) return true; // unknown daf string - let other validation handle

            const lastDafNum = limit.lastDaf;
            if (dafNum > lastDafNum) {
                markInvalid(fieldId);
                if (!silent) showToast(`${label}: דף ${dafValue} חורג מגבול מסכת ${tractate} (עד דף ${hebrewNumbers[lastDafNum - 1]} עמוד ${limit.lastAmud})`);
                return false;
            }

            // Check that if this is the last daf, amud doesn't exceed lastAmud
            if (dafNum === lastDafNum && limit.lastAmud === 'א' && amudNum > 1) {
                const amudFieldId = fieldId.includes('start') ? 'startAmud' : 'endAmud';
                markInvalid(amudFieldId);
                if (!silent) showToast(`מסכת ${tractate} מסתיימת בעמוד א של דף ${hebrewNumbers[lastDafNum - 1]} - עמוד ב לא קיים`);
                return false;
            }

            markValid(fieldId);
            markValid(fieldId.includes('start') ? 'startAmud' : 'endAmud');
            return true;
        }

        function validateRange(silent) {
            const startDaf = document.getElementById('startDaf').value;
            const startAmud = document.getElementById('startAmud').value;
            const endDaf = document.getElementById('endDaf').value;
            const endAmud = document.getElementById('endAmud').value;

            if (!startDaf || !endDaf) return true;
            if (dafToNumber(startDaf) <= 0 || dafToNumber(endDaf) <= 0) return true;

            if (compareDafAmud(startDaf, startAmud, endDaf, endAmud) > 0) {
                markInvalid('endDaf');
                markInvalid('endAmud');
                if (!silent) showToast(`טווח לא תקין: דף ${startDaf} עמוד ${startAmud} מאוחר יותר מ-${endDaf} עמוד ${endAmud}`);
                return false;
            }

            markValid('endDaf');
            markValid('endAmud');
            return true;
        }

        function runAllValidations(silent) {
            clearAllInvalid();
            const startDaf = document.getElementById('startDaf').value;
            const startAmud = document.getElementById('startAmud').value;
            const endDaf = document.getElementById('endDaf').value;
            const endAmud = document.getElementById('endAmud').value;

            let ok = true;
            ok = validateDafAgainstTractate(startDaf, startAmud, 'startDaf', 'דף התחלה', silent) && ok;
            ok = validateDafAgainstTractate(endDaf, endAmud, 'endDaf', 'דף סיום', silent) && ok;
            ok = validateRange(silent) && ok;
            return ok;
        }

        // ── Hebrew input validation (with clamping + toast) ──────────────────
        function handleDafInput(e, amudSelectId) {
            // 1. Strip non-Hebrew
            const beforeStrip = e.target.value;
            e.target.value = beforeStrip.replace(/[^א-ת]/g, '');
            if (e.target.value !== beforeStrip) {
                showToast('ניתן להזין אותיות עבריות בלבד', 'warning', 2500);
            }

            // 2. Clamp to tractate max while the user is still typing
            const tractate = getCurrentTractate();
            const limit = TRACTATE_LIMITS[tractate];
            if (limit && e.target.value) {
                const dafNum = dafToNumber(e.target.value);
                // Only clamp when the typed value is a valid Hebrew number (known in the array)
                if (dafNum > 0 && dafNum > limit.lastDaf) {
                    const clamped = hebrewNumbers[limit.lastDaf - 1];
                    e.target.value = clamped;
                    // Also fix amud if needed
                    const amudSelect = document.getElementById(amudSelectId);
                    if (limit.lastAmud === 'א') amudSelect.value = 'א';
                    showToast(`מסכת ${tractate} מגיעה רק עד דף ${clamped} עמוד ${limit.lastAmud}`, 'error');
                    runAllValidations(true);
                    return;
                }
            }

            runAllValidations();
        }

        document.getElementById('startDaf').addEventListener('input', function(e) {
            handleDafInput(e, 'startAmud');
        });

        document.getElementById('endDaf').addEventListener('input', function(e) {
            handleDafInput(e, 'endAmud');
        });

        document.getElementById('tractate').addEventListener('input', validateHebrewInputAllowSpace);

        document.getElementById('startAmud').addEventListener('change', function() {
            // If last daf is selected and tractate ends on א, block ב
            const tractate = getCurrentTractate();
            const limit = TRACTATE_LIMITS[tractate];
            if (limit && limit.lastAmud === 'א') {
                const dafNum = dafToNumber(document.getElementById('startDaf').value);
                if (dafNum === limit.lastDaf && this.value === 'ב') {
                    this.value = 'א';
                    showToast(`מסכת ${tractate} מסתיימת בעמוד א של דף ${hebrewNumbers[limit.lastDaf - 1]}`, 'error');
                    return;
                }
            }
            runAllValidations();
        });

        document.getElementById('endAmud').addEventListener('change', function() {
            const tractate = getCurrentTractate();
            const limit = TRACTATE_LIMITS[tractate];
            if (limit && limit.lastAmud === 'א') {
                const dafNum = dafToNumber(document.getElementById('endDaf').value);
                if (dafNum === limit.lastDaf && this.value === 'ב') {
                    this.value = 'א';
                    showToast(`מסכת ${tractate} מסתיימת בעמוד א של דף ${hebrewNumbers[limit.lastDaf - 1]}`, 'error');
                    return;
                }
            }
            runAllValidations();
        });

        function validateHebrewInputAllowSpace(e) {
            const before = e.target.value;
            e.target.value = before.replace(/[^א-ת ]/g, '');
            if (e.target.value !== before) showToast('ניתן להזין אותיות עבריות בלבד', 'warning', 2500);
            runAllValidations();
        }
        
        // Tractate search functionality
        const tractateInput = document.getElementById('tractate');
        const tractateDropdown = document.getElementById('tractateDropdown');
        const tractateOptions = document.querySelectorAll('.tractate-option');
        let selectedIndex = -1;
        
        tractateInput.addEventListener('input', function() {
            const searchTerm = this.value.trim();
            filterTractates(searchTerm);
            showDropdown();
        });
        
        tractateInput.addEventListener('focus', function() {
            showDropdown();
        });
        
        tractateInput.addEventListener('keydown', function(e) {
            const visibleOptions = Array.from(tractateOptions).filter(option => !option.classList.contains('hidden'));
            
            if (e.key === 'ArrowDown') {
                e.preventDefault();
                selectedIndex = Math.min(selectedIndex + 1, visibleOptions.length - 1);
                updateSelection(visibleOptions);
            } else if (e.key === 'ArrowUp') {
                e.preventDefault();
                selectedIndex = Math.max(selectedIndex - 1, -1);
                updateSelection(visibleOptions);
            } else if (e.key === 'Enter') {
                e.preventDefault();
                if (selectedIndex >= 0 && visibleOptions[selectedIndex]) {
                    selectTractate(visibleOptions[selectedIndex]);
                }
            } else if (e.key === 'Escape') {
                hideDropdown();
            }
        });
        
        // Click outside to close dropdown
        document.addEventListener('click', function(e) {
            if (!tractateInput.contains(e.target) && !tractateDropdown.contains(e.target)) {
                hideDropdown();
            }
        });
        
        // Handle option clicks
        tractateOptions.forEach(option => {
            option.addEventListener('click', function() {
                selectTractate(this);
            });
        });
        
        function filterTractates(searchTerm) {
            const normalizedSearch = searchTerm.replace(/\s+/g, '');
            let hasVisibleOptions = false;
            
            tractateOptions.forEach(option => {
                const tractateName = option.dataset.value;
                const normalizedName = tractateName.replace(/\s+/g, '');
                
                // Check if search term is found anywhere in the tractate name
                if (normalizedName.includes(normalizedSearch) || searchTerm === '') {
                    option.classList.remove('hidden');
                    hasVisibleOptions = true;
                } else {
                    option.classList.add('hidden');
                }
            });
            
            // Reset selection when filtering
            selectedIndex = -1;
            updateSelection(Array.from(tractateOptions).filter(option => !option.classList.contains('hidden')));
            
            return hasVisibleOptions;
        }
        
        function updateSelection(visibleOptions) {
            tractateOptions.forEach(option => option.classList.remove('selected'));
            if (selectedIndex >= 0 && visibleOptions[selectedIndex]) {
                visibleOptions[selectedIndex].classList.add('selected');
                visibleOptions[selectedIndex].scrollIntoView({block: 'nearest'});
            }
        }
        
        function selectTractate(option) {
            tractateInput.value = option.dataset.value;
            hideDropdown();
            selectedIndex = -1;
            runAllValidations();
        }
        
        function showDropdown() {
            tractateDropdown.style.display = 'block';
        }
        
        function hideDropdown() {
            tractateDropdown.style.display = 'none';
            selectedIndex = -1;
            tractateOptions.forEach(option => option.classList.remove('selected'));
        }
        
        // Page range controls functionality
        const hebrewNumbers = [
            'א', 'ב', 'ג', 'ד', 'ה', 'ו', 'ז', 'ח', 'ט', 'י',
            'יא', 'יב', 'יג', 'יד', 'טו', 'טז', 'יז', 'יח', 'יט', 'כ',
            'כא', 'כב', 'כג', 'כד', 'כה', 'כו', 'כז', 'כח', 'כט', 'ל',
            'לא', 'לב', 'לג', 'לד', 'לה', 'לו', 'לז', 'לח', 'לט', 'מ',
            'מא', 'מב', 'מג', 'מד', 'מה', 'מו', 'מז', 'מח', 'מט', 'נ',
            'נא', 'נב', 'נג', 'נד', 'נה', 'נו', 'נז', 'נח', 'נט', 'ס',
            'סא', 'סב', 'סג', 'סד', 'סה', 'סו', 'סז', 'סח', 'סט', 'ע',
            'עא', 'עב', 'עג', 'עד', 'עה', 'עו', 'עז', 'עח', 'עט', 'פ',
            'פא', 'פב', 'פג', 'פד', 'פה', 'פו', 'פז', 'פח', 'פט', 'צ',
            'צא', 'צב', 'צג', 'צד', 'צה', 'צו', 'צז', 'צח', 'צט', 'ק',
            'קא', 'קב', 'קג', 'קד', 'קה', 'קו', 'קז', 'קח', 'קט', 'קי',
            'קיא', 'קיב', 'קיג', 'קיד', 'קטו', 'קטז', 'קיז', 'קיח', 'קיט', 'קכ',
            'קכא', 'קכב', 'קכג', 'קכד', 'קכה', 'קכו', 'קכז', 'קכח', 'קכט', 'קל',
            'קלא', 'קלב', 'קלג', 'קלד', 'קלה', 'קלו', 'קלז', 'קלח', 'קלט', 'קמ',
            'קמא', 'קמב', 'קמג', 'קמד', 'קמה', 'קמו', 'קמז', 'קמח', 'קמט', 'קנ',
            'קנא', 'קנב', 'קנג', 'קנד', 'קנה', 'קנו', 'קנז', 'קנח', 'קנט', 'קס',
            'קסא', 'קסב', 'קסג', 'קסד', 'קסה', 'קסו', 'קסז', 'קסח', 'קסט', 'קע',
            'קעא', 'קעב', 'קעג', 'קעד', 'קעה', 'קעו'
        ];
        
        // Add keyboard event listeners for page inputs
        document.getElementById('startDaf').addEventListener('keydown', handlePageKeydown);
        document.getElementById('endDaf').addEventListener('keydown', handlePageKeydown);
        document.getElementById('startAmud').addEventListener('keydown', handleAmudKeydown);
        document.getElementById('endAmud').addEventListener('keydown', handleAmudKeydown);
        
        // Add click event listeners for arrow buttons
        document.querySelectorAll('.arrow-btn').forEach(btn => {
            btn.addEventListener('click', function() {
                const target = this.dataset.target;
                const isDown = this.classList.contains('down');
                
                if (target.includes('Daf')) {
                    adjustDaf(target, isDown); // down = next/larger, up = previous/smaller
                } else if (target.includes('Amud')) {
                    adjustAmud(target, isDown); // down = next (א to ב), up = previous (ב to א)
                }
            });
        });
        
        function handlePageKeydown(e) {
            if (e.key === 'ArrowUp') {
                e.preventDefault();
                adjustDaf(e.target.id, false); // Up = previous/smaller
            } else if (e.key === 'ArrowDown') {
                e.preventDefault();
                adjustDaf(e.target.id, true); // Down = next/larger
            }
        }
        
        function handleAmudKeydown(e) {
            if (e.key === 'ArrowUp') {
                e.preventDefault();
                adjustAmud(e.target.id, false); // Up = previous (ב to א)
            } else if (e.key === 'ArrowDown') {
                e.preventDefault();
                adjustAmud(e.target.id, true); // Down = next (א to ב)
            }
        }
        
        function adjustDaf(targetId, isNext) {
            const input = document.getElementById(targetId);
            const currentValue = input.value;
            const currentIndex = hebrewNumbers.indexOf(currentValue);

            const tractate = getCurrentTractate();
            const limit = TRACTATE_LIMITS[tractate];
            const maxIndex = limit ? limit.lastDaf - 1 : hebrewNumbers.length - 1;

            let newIndex;
            if (isNext) {
                newIndex = Math.min(currentIndex + 1, maxIndex);
            } else {
                newIndex = Math.max(currentIndex - 1, 1); // Don't go below ב (index 1)
            }

            if (newIndex !== currentIndex && newIndex >= 1) {
                input.value = hebrewNumbers[newIndex];
                runAllValidations();
            }
        }
        
        function adjustAmud(targetId, isNext) {
            const select = document.getElementById(targetId);
            const currentValue = select.value;
            const dafInputId = targetId === 'startAmud' ? 'startDaf' : 'endDaf';

            if (isNext && currentValue === 'א') {
                // Check if we'd be going to ב on the last daf of a tractate that ends on א
                const tractate = getCurrentTractate();
                const limit = TRACTATE_LIMITS[tractate];
                if (limit && limit.lastAmud === 'א') {
                    const dafNum = dafToNumber(document.getElementById(dafInputId).value);
                    if (dafNum === limit.lastDaf) {
                        showToast(`מסכת ${tractate} מסתיימת בעמוד א של דף ${hebrewNumbers[limit.lastDaf - 1]}`, 'error');
                        return;
                    }
                }
                select.value = 'ב';
                runAllValidations();
            } else if (!isNext && currentValue === 'ב') {
                select.value = 'א';
                runAllValidations();
            }
        }

        // Persist form state in localStorage so the last input is remembered.
        const STORAGE_KEY = 'dafYomiLastInput';
        const persistedFieldIds = ['tractate', 'startDaf', 'startAmud', 'endDaf', 'endAmud'];

        function saveFormState() {
            const state = {};
            persistedFieldIds.forEach(id => {
                const el = document.getElementById(id);
                if (el) state[id] = el.value;
            });
            try {
                localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
            } catch (err) {
                console.warn('Could not save form state:', err);
            }
        }

        function restoreFormState() {
            let state;
            try {
                const raw = localStorage.getItem(STORAGE_KEY);
                if (!raw) return;
                state = JSON.parse(raw);
            } catch (err) {
                console.warn('Could not restore form state:', err);
                return;
            }
            if (!state) return;
            persistedFieldIds.forEach(id => {
                if (state[id] === undefined || state[id] === null) return;
                const el = document.getElementById(id);
                if (el) el.value = state[id];
            });
        }

        restoreFormState();
        // Validate restored state silently (no toast on page load, just highlight invalid fields)
        setTimeout(() => {
            const startDaf = document.getElementById('startDaf').value;
            const endDaf = document.getElementById('endDaf').value;
            if (startDaf && endDaf) runAllValidations(true);
        }, 0);

        persistedFieldIds.forEach(id => {
            const el = document.getElementById(id);
            if (!el) return;
            el.addEventListener('change', saveFormState);
            el.addEventListener('input', saveFormState);
        });

        document.getElementById('downloadForm').addEventListener('submit', saveFormState);
    </script>
</body>
</html>
